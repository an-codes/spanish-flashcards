<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English → Spanish Flashcards 🇪🇸</title>

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Permanent+Marker&family=Luckiest+Guy&display=swap" rel="stylesheet">

    <style>
        :root{
            --card-w: 1fr;
            --card-h: 240px;
            /* Updated to bolder, more vibrant colors */
            --accent-1: #ff005d; /* bold pink */
            --accent-2: #ffd700;
            --accent-3: #00d084;
            --accent-4: #8A2BE2; /* bold purple */
            --panel-bg: #ffffff;
            --outline: #000000;
            --accent-coral: #ff7f50; /* Coral color */
            --card-radius: clamp(8px, 1.5vw, 24px);
            --card-font: clamp(0.55rem, 1.4vw, 2rem);
            --spanish-font: clamp(0.5rem, 1.3vw, 1.8rem);
            --word-font: clamp(0.6rem, 1.5vw, 2.2rem);
            --img-size: clamp(20px, 5vw, 90px);
        }

        html,body{height:100%;}
        body {
            font-family: 'Baloo 2', 'Arial', sans-serif;
            margin:0;
            background: linear-gradient(135deg, #ff7f50, #ffe5b4);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(8px, 2vw, 24px);
            gap: 10px;
            min-height: 100vh;
        }

        h1 {
            width: 100%;
            max-width: 1280px;
            text-align: center;
            color: var(--accent-4);
            margin: 0 0 4px 0;
            font-family: 'Permanent Marker', 'Baloo 2', cursive;
            font-size: clamp(20px, 3.5vw, 48px);
            letter-spacing: 0.5px;
            -webkit-text-stroke: 1px var(--outline);
        }

        .subtitle{
            width: 100%;
            max-width: 1280px;
            text-align: center;
            color: var(--accent-4);
            margin: 0 0 4px 0;
            font-family: 'Permanent Marker', 'Baloo 2', cursive;
            font-size: clamp(13px, 2vw, 24px);
            letter-spacing: 0.5px;
            -webkit-text-stroke: 1px var(--outline);
        }

        #cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(8px, 1.2vw, 24px);
            justify-content: center;
            align-items: start;
            padding: 4px 0 20px 0;
            width: 100%;
            max-width: 1600px;
        }

        .card-container{
            perspective: 1200px;
            width: 100%;
            aspect-ratio: 4 / 3;
            transition: transform 250ms ease, box-shadow 250ms ease;
            transform-origin: center center;
            position: relative;
        }

        .card-container:nth-child(5n+1){ transform: rotate(-2deg); }
        .card-container:nth-child(5n+2){ transform: rotate(1.6deg); }
        .card-container:nth-child(5n+3){ transform: rotate(-1.2deg); }
        .card-container:nth-child(5n+4){ transform: rotate(1.4deg); }
        .card-container:nth-child(5n+5){ transform: rotate(-0.6deg); }

        .card-container:hover{ transform: translateY(-8px) rotate(0deg) scale(1.04); z-index: 8; }

        .card{
            width:100%;
            height:100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 600ms cubic-bezier(.2,.9,.3,1);
            cursor: pointer;
            border-radius: var(--card-radius);
        }

        .card.flip{ transform: rotateY(180deg); }

        .card-face{
            position: absolute;
            inset:0;
            border-radius: var(--card-radius);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            box-sizing:border-box;
            padding: clamp(6px, 1vw, 14px);
            color: var(--outline);
            overflow: hidden;
            border: clamp(2px, 0.3vw, 5px) solid var(--outline);
            box-shadow: 0 4px 0 var(--outline), 0 12px 24px rgba(0,0,0,0.1);
            background: var(--panel-bg);
        }

        .front {
            background: linear-gradient(135deg, #ff005d, #6c00ff);
            color: var(--outline);
            font-size: var(--card-font);
            transform: translateZ(0);
        }

        .back {
            background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
            transform: rotateY(180deg);
            color: var(--outline);
        }

        .emoji{ font-size: clamp(2rem, 4vw, 5rem); margin-bottom: 8px; filter: drop-shadow(0 10px 18px rgba(180,130,220,0.16)); }
        .emoji-img{
            width: var(--img-size);
            height: var(--img-size);
            object-fit: contain;
            margin: 0 auto clamp(2px, 0.5vw, 8px) auto;
            display: block;
        }

        .word{
            font-family: 'Permanent Marker', 'Baloo 2', cursive;
            font-weight:800;
            font-size: var(--word-font);
            color: var(--accent-coral);
            -webkit-text-stroke: clamp(0.5px, 0.1vw, 1.5px) var(--outline);
            text-align: center;
            line-height: 1.1;
        }
        .spanish{
            font-family: 'Permanent Marker', 'Baloo 2', cursive;
            font-weight:800;
            font-size: var(--spanish-font);
            color: var(--accent-1);
            -webkit-text-stroke: clamp(0.5px, 0.1vw, 1.5px) var(--outline);
            text-align: center;
            line-height: 1.1;
        }
        .example{
            font-size: clamp(0.55rem, 0.9vw, 1rem);
            margin-top: clamp(2px, 0.5vw, 8px);
            opacity: 0.98;
            color: #222;
            text-align: center;
            line-height: 1.3;
        }

        .card-container::before{
            content: '';
            position: absolute;
            width: 80%;
            height: 14px;
            background: radial-gradient(closest-side, rgba(0,0,0,0.12), transparent);
            left: 10%;
            bottom: -10px;
            filter: blur(5px);
            transform: rotate(-2deg);
            z-index: 0;
        }

        /* ---- Responsive breakpoints ---- */

        /* Medium desktops / small laptops */
        @media (max-width: 1400px){
            #cards-grid{ grid-template-columns: repeat(5, 1fr); gap: clamp(6px, 1vw, 16px); }
        }

        @media (max-width: 1100px){
            #cards-grid{ grid-template-columns: repeat(4, 1fr); }
        }

        /* Tablets landscape */
        @media (max-width: 900px){
            #cards-grid{ grid-template-columns: repeat(3, 1fr); }
            :root{
                --img-size: clamp(40px, 8vw, 80px);
                --word-font: clamp(0.9rem, 2vw, 1.6rem);
                --spanish-font: clamp(0.85rem, 1.8vw, 1.4rem);
            }
        }

        /* Tablets portrait */
        @media (max-width: 680px){
            #cards-grid{ grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .card-container:nth-child(n){ transform: rotate(0deg); }
            .card-container:hover{ transform: translateY(-4px) scale(1.02); }
            :root{
                --img-size: clamp(32px, 10vw, 70px);
                --word-font: clamp(0.85rem, 3vw, 1.4rem);
                --spanish-font: clamp(0.8rem, 2.8vw, 1.3rem);
            }
        }

        /* Phones */
        @media (max-width: 420px){
            #cards-grid{ grid-template-columns: repeat(2, 1fr); gap: 8px; }
            :root{
                --card-radius: 14px;
                --img-size: clamp(28px, 12vw, 56px);
                --word-font: clamp(0.75rem, 3.5vw, 1.2rem);
                --spanish-font: clamp(0.7rem, 3vw, 1.1rem);
            }
            body{ padding: 8px; }
            .card-container{ aspect-ratio: 4 / 3; }
            .example{ font-size: clamp(0.5rem, 2.5vw, 0.8rem); }
        }

        /* Very small phones */
        @media (max-width: 320px){
            #cards-grid{ grid-template-columns: 1fr; }
            .card-container{ aspect-ratio: 3 / 2; }
        }

    </style>
</head>

<body>

<h1>English → Spanish Flashcards 🇪🇸</h1>
<div class="subtitle">Tap a card to flip</div>

<div id="cards-grid"></div>

<script>
    const words = [
        { english: "Hello", spanish: "Hola", image: "hey.png", example: "¡Hola! ¿Cómo estás?" },
        { english: "Goodbye", spanish: "Adiós", image: "goodbye.png", example: "¡Adiós! Nos vemos mañana." },
        { english: "Please", spanish: "Por favor", image: "please.png", example: "¿Me puedes ayudar, por favor?" },
        { english: "Thank you", spanish: "Gracias", image: "ty.png", example: "Gracias por tu ayuda." },
        { english: "Excuse me", spanish: "Perdón / Disculpe", image: "excuseme.png", example: "Perdón, ¿sabe dónde está la estación?" },
        { english: "Bathroom", spanish: "Baño", image: "toilet.png", example: "¿Dónde está el baño?" },
        { english: "Water", spanish: "Agua", image: "water.png", example: "Quisiera un poco de agua, por favor." },
        { english: "Food", spanish: "Comida", image: "food.png", example: "La comida aquí es deliciosa." },
        { english: "Where", spanish: "Dónde", image: "lupa.png", example: "¿Dónde está la estación de tren más cercana?" },
        { english: "How much", spanish: "Cuánto", image: "money.png", example: "¿Cuánto cuesta esto?" },
        { english: "Friend", spanish: "Amigo / Amiga", image: "shake.png", example: "Mi amigo vive cerca." },
        { english: "Love", spanish: "Amor", image: "love.png", example: "El amor es importante en la vida." },
        { english: "Help", spanish: "Ayuda", image: "sos.png", example: "Necesito ayuda con mi maleta." },
        { english: "Airport", spanish: "Aeropuerto", image: "airplane.png", example: "El aeropuerto está a 20 minutos en coche." },
        { english: "Train", spanish: "Tren", image: "train.png", example: "El tren llega a las 10:30." }
    ];

    const grid = document.getElementById('cards-grid');

    words.forEach((word) => {
        const container = document.createElement('div');
        container.classList.add('card-container');

        const card = document.createElement('div');
        card.classList.add('card');

        const front = document.createElement('div');
        front.classList.add('card-face', 'front');
        // use per-card image if provided, otherwise fall back to card.png
        const imgSrc = word.image ? word.image : 'card.png';
        front.innerHTML = `<div class="content"><img class="emoji-img" src="${imgSrc}" alt="" aria-hidden="true"><div class="word">${word.english}</div></div>`;

        const back = document.createElement('div');
        back.classList.add('card-face', 'back');
        back.innerHTML = `<div class="content"><div class="spanish">${word.spanish}</div><div class="example">${word.example}</div></div>`;
        // back template removed — no image prepended

        card.appendChild(front);
        card.appendChild(back);
        container.appendChild(card);
        grid.appendChild(container);

        // flip
        card.addEventListener('click', () => {
            card.classList.toggle('flip');
        });
    });
</script>

</body>
</html>
